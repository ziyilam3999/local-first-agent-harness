name: Feature Request
description: Suggest an idea for local-first-agent-harness
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Please describe what you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you thought about.
