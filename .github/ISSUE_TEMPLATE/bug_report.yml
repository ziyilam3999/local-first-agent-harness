name: Bug Report
description: Report a bug in local-first-agent-harness
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `lfah run --instance ... --local`
        2. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the relevant console output / result JSON if you can.
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Which way were you running it?
      options:
        - Cloud-only (all three roles on the cloud)
        - Local-first (executor on a local model)
        - Dry-run
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g., 3.12.3
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g., macOS 14.2, Ubuntu 22.04
